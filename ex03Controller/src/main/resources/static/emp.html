  <body>

            <div class="mb-3">
              <label for="lastName" class="form-label">lastName</label>
              <input type="text" class="form-control" id="lastName" />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="text" class="form-control" id="email" />
            </div>
            <div class="mb-3">
            <label for="hireDate" class="form-label">hireDate</label>
            <input type="text" class="form-control" id="hireDate" />
          </div>
          <div class="mb-3">
            <label for="jobId" class="form-label">jobId</label>
            <input type="text" class="form-control" id="jobId" />
          </div>

          <div>
            <button type="button" id="btnInsert" class="btn btn-warning">
              등록
            </button>
            <button type="button" id="btnUpdate" class="btn btn-warning">
              수정
            </button>
            <button type="button" id="btnDelete" class="btn btn-danger">
              삭제
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
      selectAll();

      // 버튼 부분

      /*등록 버튼*/
      document.quertSelector("#btnInsert").addEventListener("click", (e) => {
         let param = {};
        param.employeeid = document.querySelector("#employeeID").value;
        param.lastname = document.querySelector("#lastName").value;
        param.email = document.querySelector("#email").value;
        param.hireDate = document.querySelector("#hireDate").value;
        param.jobid = document.querySelector("#jobId").value;

         fetch(`http://localhost:86/api/emp`, {
          method: "POST",
          body: JSON.stringify(param),
          headers: {
            "Content-type": "application/json; charset=UTF-8",
          },
        }) 
        .then((response)=> {
          alert("등록 성공");
          document.querySelector("#emplist").innerHTML = "";
          selectAll();
        })
      });

      /* 수정 버튼 */
      document.querySelector("#btnUpdate").addEventListener("click", (e) => {
        let param = {};
        param.employeeid = document.querySelector("#employeeID").value;
        param.lastname = document.querySelector("#lastName").value;
        param.email = document.querySelector("#email").value;
        param.jobid = document.querySelector("#jobId").value;

        fetch(`http://localhost:86/api/emp/${param.employeeid}`, {
          method: "PUT",
          body: JSON.stringify(param),
          headers: {
            "Content-type": "application/json; charset=UTF-8",
          },
        }) 
        .then((response)=> {
          alert("수정 완료");
          document.querySelector("#emplist").innerHTML = "";
          selectAll();
        })
      });

      /*삭제 버튼*/
      document.querySelector("#btnDelete").addEventListener("click", (e) => {
        let empid = document.querySelector("#employeeID").value;
        fetch(`http://localhost:86/api/emp/${empid}`, {
          method: "DELETE",
        }).then((response) => {
          alert("삭제가 완료됨");
          selectAll();
        });
      });

      /* 사원 목록 전체조회 */
      function selectAll(empid) {

          .then((post) => {
            for (let i = 0; i < post.length; i++) {
              let tag = `
                <tr data-id="${post[i].employeeId}">
                  <td>${post[i].employeeId}</td>
	                <td>${post[i].lastName}</td>
	                <td>${post[i].Email}</td>
	                <td>${post[i].hireDate}</td>
	                <td>${post[i].jobId}</td>
                </tr>`;
              document
                .querySelector("#emplist")
                .insertAdjacentHTML("beforeend", tag);
            }
          });
      }

  </body>
</html>
