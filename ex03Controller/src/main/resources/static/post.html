<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>post</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-lg">
      <!-- Content here -->
      <div class="row">
        <div class="col border">
          <table class="table table-striped">
            <thead>
              <tr>
                <td>번호</td>
                <td>제목</td>
                <td>작성자</td>
              </tr>
            </thead>
            <tbody id="postlist"></tbody>
          </table>
        </div>
        <div class="col border">
          <div class="card">
            <div class="card-body">
              <div class="mb-3">
                <label for="postid" class="form-label">post id</label>
                <input type="text" class="form-control" id="postid" />
              </div>
              <div class="mb-3">
                <label for="posttitle" class="form-label">posttitle</label>
                <input type="text" class="form-control" id="posttitle" />
              </div>
              <div class="mb-3">
                <label for="userid" class="form-label">userid</label>
                <input type="text" class="form-control" id="userId" />
              </div>
              <div class="mb-3">
                <label for="postbody" class="form-label">body</label>
                <textarea
                  class="form-control"
                  id="postbody"
                  rows="5"
                ></textarea>
              </div>
              <div>
                <button type="button" id="btnUpdate" class="btn btn-success">
                  수정
                </button>
                <button type="button" id="btnDelete" class="btn btn-danger">
                  삭제
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <table class="table table-striped">
          <tbody id="commentlist"></tbody>
        </table>
      </div>
    </div>

    <script>
      //페이지 로딩 후 게시글 전체조회
      selectAll();

      //클릭하면 댓글과 단건조회
      document.querySelector("#postlist").addEventListener("click", (e) => {
        id = e.target.closest("tr").dataset.id;
        commantAll(id);
        selectOne(id);
      });

      //수정버튼 클릭핸들러
      document.querySelector("#btnUpdate").addEventListener("click", (e) => {
        let param = {};
        param.id = document.querySelector("#postid").value;
        param.title = document.querySelector("#posttitle").value;
        param.body = document.querySelector("#postbody").value;
        param.userId = document.querySelector("#userId").value;

        fetch("https://jsonplaceholder.typicode.com/posts/" + param.id, {
          method: "PUT",
          body: JSON.stringify(param),
          headers: {
            "Content-type": "application/json; charset=UTF-8",
          },
        })
          .then((response) => response.json())
          .then((json) => console.log(json));
      });

      //삭제버튼 클릭핸들러
      document.querySelector("#btnDelete").addEventListener("click", (e) => {
        let id = document.querySelector("#postid").value;
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
          method: "DELETE",
        }).then((response) => {
          alert("삭제완료");
          selectAll();
        });
      });

      /*-----------------------
      게시글 단건조회
      ------------------------*/
      function selectOne(id) {
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`)
          .then((response) => response.json())
          .then((post) => {
            document.querySelector("#postid").value = post.id;
            document.querySelector("#posttitle").value = post.title;
            document.querySelector("#postbody").value = post.body;
            document.querySelector("#userid").value = post.userId;
          });
      }

      /*-----------------------
      댓글 전체조회
      ------------------------*/
      function commantAll(id) {
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}/comments`)
          .then((response) => response.json())
          .then((comments) => {
            document.querySelector("#commentlist").innerHTML = "";
            for (comment of comments) {
              let tag = `              
                  <tr>
                    <td>${comment.postId}</td>
                    <td>${comment.id}</td>
                    <td>${comment.name}</td>
                    <td>${comment.email}</td>
                    <td>${comment.body}</td>
                  </tr>`;
              document
                .querySelector("#commentlist")
                .insertAdjacentHTML("beforeend", tag);
            }
          });
      }

      /*-----------------------
      게시글 전체조회
      ------------------------*/
      function selectAll() {
        fetch("https://jsonplaceholder.typicode.com/posts")
          .then((response) => response.json())
          .then((post) => {
            for (let i = 0; i < 10; i++) {
              let tag = `              
                  <tr data-id="${post[i].id}">
                    <td>${post[i].id}</td>
                    <td>${post[i].title}</td>
                    <td>${post[i].userId}</td>
                  </tr>`;
              document
                .querySelector("#postlist")
                .insertAdjacentHTML("beforeend", tag);
            }
          });
      }
    </script>
  </body>
</html>
